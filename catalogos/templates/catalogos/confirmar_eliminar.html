{% extends 'catalogos/base.html' %}

{% block content %}
<div class="modal-glass">
    <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #ff4d4d; margin-bottom: 1rem;"></i>
    <h2>¿Eliminar definitivamente?</h2>
    <p style="margin: 1rem 0;">Estás a punto de borrar <strong style="color: #ff9a3c;">"{{ contenido.titulo }}"</strong>
        ({{ contenido.anio }})</p>
    <p style="font-size: 0.9rem;">Esta acción no se puede deshacer.</p>
    <form method="post" style="margin-top: 2rem;">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <button type="submit" class="btn-danger">
                <i class="fas fa-trash-alt"></i> Sí, eliminar
            </button>
            <a href="{% url 'lista_contenido' %}" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
